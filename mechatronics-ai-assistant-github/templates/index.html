<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#x5D4C;&#x5165;&#x5F0F;&#x57FA;&#x7840;&#x5B9E;&#x9A8C;&#x52A9;&#x624B;</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="topbar__brand">&#x5D4C;&#x5165;&#x5F0F;&#x57FA;&#x7840;&#x5B9E;&#x9A8C;&#x52A9;&#x624B;</div>
        <div class="topbar__hint">&#x5F53;&#x524D;&#x652F;&#x6301;&#x591A;&#x79CD;&#x57FA;&#x7840;&#x5B9E;&#x9A8C;&#x95EE;&#x7B54;</div>
    </header>

    <main class="layout-shell">
        <section class="hero-section">
            <div class="experiment-toolbar">
                <label class="experiment-toolbar__copy" for="experimentSelect">
                    <span class="experiment-toolbar__label">&#x9009;&#x62E9;&#x5F53;&#x524D;&#x5B9E;&#x9A8C;</span>
                    <select id="experimentSelect" class="experiment-toolbar__select"></select>
                </label>
                <div class="experiment-toolbar__meta">
                    <span class="experiment-toolbar__chip" id="experimentSubtitle"></span>
                </div>
            </div>

            <h1 class="hero-section__title">&#x5D4C;&#x5165;&#x5F0F;&#x57FA;&#x7840;&#x5B9E;&#x9A8C;&#x52A9;&#x624B;</h1>
            <h2 class="hero-section__subtitle" id="heroExperimentName"></h2>
            <p class="hero-section__description" id="heroExperimentSummary"></p>

            <div class="hero-section__tags">
                <span class="hero-tag hero-tag--primary" id="currentExperimentTag"></span>
                <span class="hero-tag hero-tag--soft">&#x9009;&#x62E9;&#x5B9E;&#x9A8C;&#x540E;&#x81EA;&#x52A8;&#x66F4;&#x65B0;&#x95EE;&#x9898;</span>
                <span class="hero-tag hero-tag--neutral">&#x652F;&#x6301;&#x5FEB;&#x6377;&#x63D0;&#x95EE;&#x4E0E;&#x81EA;&#x7531;&#x63D0;&#x95EE;</span>
            </div>
        </section>

        <section class="content-grid">
            <aside class="shortcut-panel">
                <div class="panel-heading">
                    <h3 class="panel-title">&#x5FEB;&#x6377;&#x63D0;&#x95EE;</h3>
                    <p class="panel-subtitle">&#x4E0B;&#x9762;&#x7684;&#x95EE;&#x9898;&#x4F1A;&#x6839;&#x636E;&#x5F53;&#x524D;&#x5B9E;&#x9A8C;&#x81EA;&#x52A8;&#x53D8;&#x5316;&#x3002;</p>
                </div>
                <div class="shortcut-panel__status">
                    <span class="shortcut-panel__status-label">&#x5F53;&#x524D;&#x5B9E;&#x9A8C;</span>
                    <strong class="shortcut-panel__status-name" id="sideExperimentName"></strong>
                </div>
                <div id="shortcutList" class="shortcut-list"></div>
            </aside>

            <section class="chat-panel">
                <div class="chat-panel__header">
                    <div class="chat-panel__heading">
                        <span class="chat-panel__badge">AI &#x52A9;&#x6559;</span>
                        <h3>&#x5B9E;&#x9A8C;&#x95EE;&#x7B54;&#x533A;</h3>
                    </div>
                    <div class="chat-panel__meta">
                        <div class="chat-panel__experiment">
                            <span class="chat-panel__experiment-label">&#x5F53;&#x524D;&#x5B9E;&#x9A8C;</span>
                            <strong class="chat-panel__experiment-name" id="chatExperimentName"></strong>
                        </div>
                        <span class="chat-panel__status" id="statusTag">&#x5728;&#x7EBF;</span>
                    </div>
                </div>

                <div class="chat-stream" id="replyPanel">
                    <article class="message-row ai-row">
                        <div class="message-avatar message-avatar--ai">AI</div>
                        <div class="message-stack">
                            <span class="message-role">AI &#x52A9;&#x6559;</span>
                            <div class="message-bubble message-bubble--ai">
                                &#x4F60;&#x597D;&#xFF0C;&#x4F60;&#x53EF;&#x4EE5;&#x5148;&#x9009;&#x62E9;&#x5F53;&#x524D;&#x5B9E;&#x9A8C;&#xFF0C;&#x518D;&#x70B9;&#x51FB;&#x5DE6;&#x4FA7;&#x5FEB;&#x6377;&#x63D0;&#x95EE;&#xFF0C;&#x6216;&#x8005;&#x76F4;&#x63A5;&#x8F93;&#x5165;&#x4F60;&#x7684;&#x95EE;&#x9898;&#x3002;
                            </div>
                        </div>
                    </article>
                </div>

                <div class="composer">
                    <div class="composer__box">
                        <textarea
                            id="chatInput"
                            rows="3"
                            placeholder="&#x8BF7;&#x8F93;&#x5165;&#x4F60;&#x5728;&#x5F53;&#x524D;&#x5B9E;&#x9A8C;&#x4E2D;&#x9047;&#x5230;&#x7684;&#x95EE;&#x9898;..."
                        ></textarea>

                        <div class="composer__actions">
                            <span class="composer__hint">Enter &#x53D1;&#x9001;&#xFF0C;Shift + Enter &#x6362;&#x884C;</span>
                            <button class="composer__clear" id="clearBtn" type="button">&#x6E05;&#x7A7A;&#x5BF9;&#x8BDD;</button>
                            <button class="composer__send" id="sendBtn" type="button">&#x53D1;&#x9001;</button>
                        </div>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <script>
        window.APP_CONFIG = {
            experiments: {{ experiments|tojson }},
            defaultExperimentId: {{ default_experiment_id|tojson }}
        };
    </script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
